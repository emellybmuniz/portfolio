<script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@graph": [
      {
        "@type": "Person",
        "@id": "{{ .Site.BaseURL }}#person",
        "name": "Emelly Beatriz",
        "jobTitle": "Estudante engenharia de software",
        {{- $profile := resources.Get "images/hero/profile-picture.webp" }}
        {{- if $profile }}
        "image": "{{ $profile.Permalink }}",
        {{- end }}
        "url": "{{ .Site.BaseURL }}",
        "sameAs": [
          {{- $links := slice }}
          {{- with .Site.Data.socials.linkedin }}{{ $links = $links | append (printf "\"%s\"" .) }}{{ end }}
          {{- with .Site.Data.socials.github }}{{ $links = $links | append (printf "\"%s\"" .) }}{{ end }}
          {{- with .Site.Data.socials.instagram }}{{ $links = $links | append (printf "\"%s\"" .) }}{{ end }}
          {{ delimit $links ", " | safeJS }}
        ]
      },
      {
        "@type": "WebSite",
        "@id": "{{ .Site.BaseURL }}#website",
        "url": "{{ .Site.BaseURL }}",
        "name": "{{ .Site.Title }}",
        "publisher": {
          "@id": "{{ .Site.BaseURL }}#person"
        },
        "inLanguage": "{{ .Site.Language.Lang }}"
      }
    ]
  }
</script>
