{{ $ts := resources.Get "core/scripts/main.ts" }}
{{ if $ts }}
  {{ $js := $ts | js.Build (dict "minify" true "format" "esm") | resources.Fingerprint }}
  <script
    type="module"
    src="{{ $js.RelPermalink }}"
    integrity="{{ $js.Data.Integrity }}"
    crossorigin="anonymous"
  ></script>
{{ end }}
